version: '3.8'

services:
  traefik:
    image: traefik:v3.0
    container_name: traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8081:8081"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - web

  apache-test:
    image: httpd:latest
    container_name: apache-server
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.apache.rule=Host(`localhost`) && Port(`8080`)"
      - "traefik.http.services.apache.loadbalancer.server.port=80"
    networks:
      - web

networks:
  web:
    external: false  
