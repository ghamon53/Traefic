name: Déploiement de Traefik

on:
  push:
    branches:
      - main

jobs:
  deploy:
    # IMPORTANT : On indique à GitHub d'utiliser votre runner local et non un serveur cloud GitHub
    runs-on: self-hosted

    steps:
      - name: Connexion au dépôt (Récupère le code sur la VM)
        uses: actions/checkout@v4

      - name: Déploiement local de Traefik via Docker Compose
        run: |
          # Le runner est déjà dans le dossier de travail, on lance directement Docker
          docker compose down --remove-orphans
          docker compose up -d

      - name: Tester en local si Traefik répond sur le port 80
        run: |
          echo "Attente du démarrage de Traefik..."
          sleep 5
          
          # Test en local direct (localhost) vu que le runner est sur la VM
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80)
          
          echo "Code de réponse reçu : $STATUS_CODE"
          
          if [ "$STATUS_CODE" -eq 404 ] || [ "$STATUS_CODE" -eq 200 ]; then
            echo "Test réussi : Traefik est bien accessible localement sur le port 80."
          else
            echo "Erreur : Traefik ne répond pas (Code: $STATUS_CODE)."
            exit 1
          fi
