name: Déploiement de Traefik

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Connexion au dépôt
        uses: actions/checkout@v4

      - name: Configuration de la clé SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Déploiement sur la VM Debian via SSH
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "mkdir -p ~/traefik-deploy"
          scp -o StrictHostKeyChecking=no docker-compose.yml ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/traefik-deploy/docker-compose.yml
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            cd ~/traefik-deploy
            docker compose down --remove-orphans
            docker compose up -d
          "

      - name: Tester dans la pipeline si Traefik répond sur le port 80
        run: |
          echo "Attente du démarrage de Traefik..."
          sleep 5
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.SSH_HOST }}:80)
          echo "Code de réponse reçu : $STATUS_CODE"
          if [ "$STATUS_CODE" -eq 404 ] || [ "$STATUS_CODE" -eq 200 ]; then
            echo "Test réussi : Traefik est bien accessible sur le port 80."
          else
            echo "Erreur : Traefik ne répond pas (Code: $STATUS_CODE)."
            exit 1
          fi
